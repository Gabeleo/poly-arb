services:
  encoder:
    build:
      context: ./encoder
    ports:
      - "8000:8000"
    volumes:
      - encoder-cache:/cache
    environment:
      - TRANSFORMERS_CACHE=/cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  daemon:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        PROXY_CA_CERT_B64: ${PROXY_CA_CERT_B64:-}
    ports:
      - "8080:8080"
    command: ["--daemon", "--host", "0.0.0.0"]
    env_file:
      - .env
    environment:
      - POLYARB_API_KEY=${POLYARB_API_KEY:-}
      - POLYARB_ENCODER_URL=${POLYARB_ENCODER_URL:-http://encoder:8000}
      - POLYARB_KALSHI_API_KEY=${POLYARB_KALSHI_API_KEY:-}
      - POLYARB_KALSHI_KEY_FILE=/run/secrets/kalshi_key
      - POLYARB_DATABASE_URL=${POLYARB_DATABASE_URL:-sqlite:///polyarb.db}
      - POLYARB_TELEGRAM_BOT_TOKEN=${POLYARB_TELEGRAM_BOT_TOKEN:-}
      - POLYARB_TELEGRAM_CHAT_ID=${POLYARB_TELEGRAM_CHAT_ID:-}
      - POLYARB_TELEGRAM_WEBHOOK_URL=${POLYARB_TELEGRAM_WEBHOOK_URL:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - NO_PROXY=${NO_PROXY:-}
      - no_proxy=${no_proxy:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      encoder:
        condition: service_healthy
    volumes:
      - ${KALSHI_KEY_FILE:-.docker-dummy-key}:/run/secrets/kalshi_key:ro

  client:
    build:
      context: .
    stdin_open: true
    tty: true
    network_mode: "service:daemon"
    command: ["--url", "http://127.0.0.1:8080"]
    depends_on:
      - daemon

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/alerting:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./deploy/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  encoder-cache:
  prometheus-data:
  grafana-data:

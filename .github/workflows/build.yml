name: Build & Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  DAEMON_IMAGE: ghcr.io/${{ github.repository }}/daemon
  ENCODER_IMAGE: ghcr.io/${{ github.repository }}/encoder

jobs:
  build-daemon:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push daemon
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DAEMON_IMAGE }}:latest
            ${{ env.DAEMON_IMAGE }}:${{ github.sha }}

  build-encoder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push encoder
        uses: docker/build-push-action@v6
        with:
          context: ./encoder
          push: true
          tags: |
            ${{ env.ENCODER_IMAGE }}:latest
            ${{ env.ENCODER_IMAGE }}:${{ github.sha }}

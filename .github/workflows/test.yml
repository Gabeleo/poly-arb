name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: polyarb
          POSTGRES_PASSWORD: polyarb_test
          POSTGRES_DB: polyarb_test
        options: >-
          --health-cmd "pg_isready -U polyarb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" psycopg2-binary

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://polyarb:polyarb_test@localhost:5432/polyarb_test
        run: alembic upgrade head

      - name: Run tests against PostgreSQL
        env:
          DATABASE_URL: postgresql://polyarb:polyarb_test@localhost:5432/polyarb_test
        run: pytest --tb=short -q
